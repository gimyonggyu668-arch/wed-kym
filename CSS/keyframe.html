<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body {
        margin: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #f3f4f6;
        gap: 10px;
    }

    .box {
        width: 120px;
        height: 120px;
        border-radius: 16px;
        background-color: #60a5fa;
        animation: bounceColor 2.4s ease-in-out infinite alternate;
        margin-bottom: 30px;
    }
    

    @keyframes bounceColor {
        0% {
            transform: translateY(0);
            background-color: #60a5fa;
        }
        50% {
            transform: translateY(-24px);
            background-color: #f87171;
        }
        100% {
            transform: translateY(0);
            background-color: #34d399;
        }
    }

    .spinner {
        width: 64px;
        height: 64px;
        border-radius: 50%; 
        border: 6px solid #e5e7eb;
        border-top-color: #3b82f6;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        0% {
            transform: rotate(0deg);
        }
        100% {
            transform: rotate(360deg);
        }
    }
    .badge{
        display : inline-blick;
        padding : 10px 14px;
        border-radius : 999px;
        background : #8e44ad;
        color : white;
        font-weight : 700;

        /* step(단계수, 위치) : 애니메이션을 일정한 단계로 끊어서
        움직이게 만드는 타이밍 함수 */
        animation : hop 0.8s steps(4, end) infinite alternate;
    }
    @keyframes hop{
        from{
            transform : translateX(0);
        }
        to{
            transform : translateX(80px);
        }
    }
    </style>
</head>
<body>
    <h2>바운스 박스</h2>
    <div class="box"></div>
    <h2>스피너</h2>
    <div class="spinner"></div>
    <hr>
    <h2>step 애니메이션</h2>
    <span class="badge">setp</span>
</body>
</html>
