<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .page{
            /* container-type : inline-size;
            container-name : page; */
            width : 800px;
            container-type : inline-size;
            container-name : page;
            border : 2px solid black;
        }
        .card{
            padding : 20px;
            background : skyblue;
        }
        /* 컨테이너가 여러갠데 기준을 정해주지 않는다
        가장 가까운 컨테이너가 적용이 된다. */
        @container page(min-width : 800px){
            .card{
                background-color : tomato;
            }
        }
    </style>
</head>
<body>
    <!-- 컨테이너가 하나뿐이라면 이름을 붙일 필요가 없지만
     컨테이너가 여러 개 일 때 어떤 컨테이너를 기준으로 할지 정하기 위해 이름을 붙일 수 있다. -->
     <div class="page">
        <div class="sidebar">
             <div class="card">
             카드
            </div>
        </div>
    </div>
</body>
</html>
