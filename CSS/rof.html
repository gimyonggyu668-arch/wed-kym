<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>갤러리 카드 페이지</title>
    <style>
        /* 페이지 전체 배경색 및 기본 폰트 설정 */
        body {
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        /* 1. 전체 영역을 감싸는 컨테이너: 너비 1000px, 화면 가운데 배치 */
        .gallery-container {
            width: 1000px;
            margin-left: auto;
            margin-right: auto;
            padding-bottom: 60px;
        }

        /* 2. 페이지 제목: 가운데 정렬 */
        h1 {
            text-align: center;
            font-size: 32px;
            color: #222222;
            margin-top: 50px;
            margin-bottom: 40px;
        }

        /* 3. 카드 목록: display:flex로 가로 방향 나열 및 사이 간격 배치 */
        .card-list {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
        }

        /* 4. 각각의 카드: 너비 300px, 배경색(흰색), 테두리, 안쪽 여백 적용 */
        .card {
            width: 300px;
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            padding: 20px;
            box-sizing: border-box; /* 패딩이 너비 300px 내에 포함되도록 설정 */
        }

        /* 5. 카드 이미지: 너비 100% 지정 */
        .card img {
            width: 100%;
            height: 120px;
            display: block;
        }

        /* 카드 내부 텍스트 스타일 */
        .card h2 {
            font-size: 18px;
            color: #111111;
            margin-top: 20px;
            margin-bottom: 8px;
        }

        .card p {
            font-size: 14px;
            color: #777777;
            margin-top: 0px;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        /* 6. 버튼: 배경색(짙은 초록색), 글자색(흰색), 테두리, 안쪽 여백 적용 */
        .card button {
            background-color: #1e5a3e;
            color: #ffffff;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="gallery-container">
        
        <h1>갤러리</h1>
        
        <div class="card-list">
            
            <div class="card">
                <img src="https://via.placeholder.com/260x170/cbdcd0/1e5a3e?text=Spring" alt="봄 풍경">
                <h2>봄 풍경</h2>
                <p>따뜻한 봄날의 풍경입니다.</p>
                <button>자세히 보기</button>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/260x170/bad1e4/2c5a85?text=Summer" alt="여름 바다">
                <h2>여름 바다</h2>
                <p>시원하고 푸른 여름 바다입니다.</p>
                <button>자세히 보기</button>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/260x170/ebd8be/815329?text=Autumn" alt="가을 단풍">
                <h2>가을 단풍</h2>
                <p>붉게 물든 가을 단풍 풍경입니다.</p>
                <button>자세히 보기</button>
            </div>

        </div>
    </div>

</body>
</html>
