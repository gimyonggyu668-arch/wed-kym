<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* body
        배경색 #f7f9fc
        내부여백 20px
        */
        body{
            background: #f7f9fc;
            padding: 20px;
        }




        /*box
        너비 200
        margin-bottom : 20px
        배경색 #74b9ff
        글씨색 흰색
        테두리 2px solid #0984e3 */
        .box{
            width: 200px;
            margin-bottom: 20px;
            background: #74b9ff;
            color: white;
            border: 2px solid #0984e3;
            text-align: center;
        } 
        .padding-top{
            padding-top: 30px;
        }
        .padding-right{
            padding-right: 30px;
        }
        .padding-left{
            padding-left: 30px;
        }
        .padding-bottom{
            padding-bottom: 30px;
        }
        .padding-all{
            padding: 30px;
        }
        .padding-four{
            padding: 10px 20px 30px 40px;
        }
    </style>
</head>
<body>
    <!-- padding
     테두리와 내용 사이의 여백
     padding: 네 방향의 여백을 한번에 지정할 수 있다.
     padding: 10px  상, 하, 좌, 우
     padding: 10px 20px 상하/좌우
     padding: 10px 20px 30px 상/좌우/하
     padding: 10px 20px 30px 40px 상 우 하 좌
     padding-top, padding-right, padding-left, padding-bottom
          -->
    <div class="box padding-top">padding-top</div>
    <div class="box padding-right">padding-right</div>
    <div class="box padding-left">padding-left</div>
    <div class="box padding-bottom">padding-bottom</div>
    <div class="box padding-all">padding-all</div>
    <div class="box padding-four">padding-four</div>

</body>
</html>
