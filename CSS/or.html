<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📌 자유게시판</title>
  <style>
    /* 2. CSS 설정 */
    
    /* 기본 설정 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Malgun Gothic', dotum, sans-serif;
      background-color: #f5f6f7;
      color: #333333;
      padding: 40px 20px;
    }

    /* 게시판 전체 박스 */
    .board-container {
      max-width: 900px;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }

    /* 헤더 영역 */
    .board-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      border-bottom: 2px solid #333333;
    }

    .board-title {
      font-size: 22px;
      font-weight: bold;
    }

    /* 검색창과 버튼 영역 */
    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .search-box {
      padding: 8px 12px;
      border: 1px solid #cccccc;
      border-radius: 4px;
      font-size: 14px;
      outline: none;
    }

    .write-btn {
      padding: 8px 16px;
      background-color: #007bff;
      color: #ffffff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }

    .write-btn:hover {
      background-color: #0056b3;
    }

    /* 게시글 목록 및 행 공통 스타일 */
    .list-header, .post-row {
      display: flex;
      align-items: center;
      padding: 12px 20px;
    }

    /* 목록 제목 행 스타일 */
    .list-header {
      background-color: #f8f9fa;
      font-weight: bold;
      border-bottom: 1px solid #e9ecef;
      text-align: center;
    }

    /* 게시글 행 스타일 */
    .post-row {
      border-bottom: 1px solid #eeeeee;
      text-align: center;
    }

    .post-row:hover {
      background-color: #fafafa;
    }

    /* 각 열의 크기 지정 */
    .col-no {
      width: 60px;
    }

    .col-author {
      width: 100px;
    }

    .col-date {
      width: 110px;
    }

    .col-views {
      width: 70px;
    }

    .col-title {
      flex: 1;
      text-align: left;
      padding-left: 10px;
    }

    /* 제목 링크 스타일 */
    .col-title a {
      color: #333333;
      text-decoration: none;
    }

    .col-title a:hover {
      text-decoration: underline;
      color: #007bff;
    }

    /* 페이지 번호 영역 */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 5px;
      padding: 25px 0;
    }

    /* 페이지 버튼 기본 스타일 */
    .page-btn {
      padding: 6px 12px;
      border: 1px solid #dddddd;
      background-color: #ffffff;
      font-size: 14px;
      border-radius: 4px;
      cursor: pointer;
      color: #555555;
    }

    .page-btn:hover {
      background-color: #f1f1f1;
    }

    /* 현재 페이지 버튼 스타일 */
    .page-btn.active {
      background-color: #333333;
      color: #ffffff;
      border-color: #333333;
    }
  </style>
</head>
<body>

  <div class="board-container">
    
    <header class="board-header">
      <h1 class="board-title">📌 자유게시판</h1>
      <div class="header-actions">
        <input type="text" class="search-box" placeholder="제목을 검색하세요">
        <button class="write-btn">글쓰기</button>
      </div>
    </header>

    <div class="list-header">
      <span class="col-no">번호</span>
      <span class="col-title">제목</span>
      <span class="col-author">작성자</span>
      <span class="col-date">작성일</span>
      <span class="col-views">조회수</span>
    </div>

    <div class="post-list">
      <div class="post-row">
        <span class="col-no">5</span>
        <span class="col-title"><a href="#">도서관 휴관 안내 (6월 25일)</a></span>
        <span class="col-author">관리자</span>
        <span class="col-date">2026-06-18</span>
        <span class="col-views">128</span>
      </div>
      <div class="post-row">
        <span class="col-no">4</span>
        <span class="col-title"><a href="#">신간 도서 입고 안내드립니다</a></span>
        <span class="col-author">관리자</span>
        <span class="col-date">2026-06-15</span>
        <span class="col-views">96</span>
      </div>
      <div class="post-row">
        <span class="col-no">3</span>
        <span class="col-title"><a href="#">스터디룸 예약 방법 문의드립니다</a></span>
        <span class="col-author">김도윤</span>
        <span class="col-date">2026-06-12</span>
        <span class="col-views">54</span>
      </div>
      <div class="post-row">
        <span class="col-no">2</span>
        <span class="col-title"><a href="#">반납 연체료 관련 질문있어요</a></span>
        <span class="col-author">이서연</span>
        <span class="col-date">2026-06-10</span>
        <span class="col-views">41</span>
      </div>
      <div class="post-row">
        <span class="col-no">1</span>
        <span class="col-title"><a href="#">전자책 대출 서비스 오픈했습니다</a></span>
        <span class="col-author">관리자</span>
        <span class="col-date">2026-06-05</span>
        <span class="col-views">203</span>
      </div>
    </div>

    <div class="pagination">
      <button class="page-btn">이전</button>
      <button class="page-btn active">1</button>
      <button class="page-btn">2</button>
      <button class="page-btn">3</button>
      <button class="page-btn">4</button>
      <button class="page-btn">5</button>
      <button class="page-btn">다음</button>
    </div>
    
  </div>

</body>
</html>
