<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{ 
            display: flex;
            margin: 20px;
            gap: 20px;
        }
        .box{
            width: 150px;
            background-color: #74b9ff;
            color: white;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
        }
        .fixed{
            height: 100px;
        }
        .min{
            min-height: 100px;
        }
        .max{
            max-height: 100px;
            overflow-y: auto;
        }
        .auto{
            height: auto;
        }
    </style>
</head>
<body>
    <h1>Height 속성 실습</h1>
    <div class="container">
        <div class="box fixed">
            <strong>height: 100px</strong><br>
            고정된 높이입니다.<br> 
            내용이 많아도 늘어나지 않습니다.
        </div>
        <div class="box min">
            <strong>min-height: 100px</strong><br>
            내용이 적을 때는<br>100px 유지, <br>
        </div>
        <div class="box max">
            <strong>max-height: 100px</strong><br>
            내용이 많으면 스크롤이 생긴다.
        </div>
        <div class="box auto">
            <strong>max-height: 100px</strong><br>
            콘텐츠 양에 따라 높이가 자동으로 늘어난다.
        </div>
    </div>
</body>
</html>
