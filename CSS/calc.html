<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display : flex;
            gap : 10px
        }
        .aside{
            width : 200px;
            background:skyblue;
            border : 1px solid black;
        }

        .main1{
            border : 1px solid black;
            /* 남은공간 전체를 main에게 할당하고 싶다. */
            width : calc(100% - 200px);
        }
        .container2{
            display : flex;
            flex-direction : column;
            gap : 10px;
            border : 1px solid black;
            height : 100vh; 
        }
        header{
            height : 80px;
            background: cornflowerblue;
        }
        

        .main2{
            background : orange;
            /* 100%로 하면 부모의 높이를 따라가는
             */
            height : calc(100% - 80px);
        }
    </style>
</head>
<body>
    <!-- clac() 함수
     css에서 값을 직접 계산해서 사용하는 함수 
     사칙연산을 이용하여 길이나 크기를 계산할 수 있다.
     "전체 화면에서 100px만 빼고싶다" 고정크기(px)와 비율(%)을 함께 계산할 수 있다. 
     
     브라우저 전체 너비가 1000px이고 왼쪽 메뉴가 250px이면 남은공간 750px이다.
     브라우저의 크기가 바뀌면 직접 바꿔줄 수 없으니 css에게 계산을 맡긴다.
     calc(100% - 250px)
     -->

     <div class="container">
        <aside>메뉴</aside>
        <main class="main1">본문</main>
     </div>
     <hr>
     <div class="container">
        <header>헤더</header>
        <main class="main2">내용</main>
     </div>



</body>
</html>
