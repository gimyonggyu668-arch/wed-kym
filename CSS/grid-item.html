<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display : grid;
            /* 3열을 1fr씩 배치 
            2개의 행을 각각 100px 높이로 설정
            셀 간 간격은 10px */
            grid-template-columns : repeat(3,1fr);
            grid-template-rows : 100px 100px;
            gap : 10px;
        }
        .item{
            /* 배경색을 #ddd 
            display : flex
            글자를 가운데 정렬*/
            background : #ddd;
            display : flex;
            justify-content : center;
            align-items : center;
        }
        /* 기본적으로는 순서대로 자동 배치되지만, 원하는 위치에 직접 배치할 수 있다.
        grid에서는 칸 자체가 아니라 선(line)을 기준으로 위치를 지정한다. 
        선을 기준으로 시작 위치랑 끝 위치를 지정한다.*/

        .item1{
            /* 1번 세로선 부터 3번 세로선까지 차지 */
            grid-column : 1/3;
        }
        .item2{
            grid-row : 1/3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item itme1">1</div>
        <div class="item item1">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
    </div>
</body>
</html>
