<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<body>
    <style>
    /* flexbox를 이용한 중앙 정렬
     flexbox: 요소들을 한 줄 또는 여러 줄로 자연스럽게 배치하고 
     정렬하고 간격을 조절하기 위한 레이아웃 시스템이다.  */
     
     /*display 속성
     - 해당 요소가 레이아웃에서 어떻게 동작할지 결정하는 속성 
     display : block; -> 요소를 블록 속성으로 만든다.
     display : inline; -> 요소를 인라인으로 만든다.
     display : inline-block -> 줄 안에 배치되지만
     width/height를 줄 수 있는 작은 박스 버튼처럼 쓸 수 있다.
     display : flex -> 안에 있는 자식들을 한 줄에 정렬하거나 
     가운데 정렬 등 배치를 쉽게 조절할 수 있게 바꾼다.
     display : grid -> 가로/세로 격자 형태 레이아웃을 만들 수 있는 모드 */
    .box{
        background : #74b9ff;
        color : white;
        padding : 10px;
        margin : 5px;
        border-radius : 6px;
    }
    .block{
        display : block;
        width : 60px;
        height : 40px;
    }
    .inline{
        display : inline;
        /* 인라인 속성은 크기 조절을 할 수 없다.  */
        width : 30px;
        height : 50px;
    }
    .inline-block{
        display : inline-block;
        width : 100px;
        height : 70px;
    }
    .flex{
        width : 200px;
        height : 200px;
        display : flex;
        /* justify-content : 가로 방향 정렬 */
        justify-content : center;
        /* align-items : 세로 방향 정렬 */
        align-items : center;
    }
    /* Transform 정렬
    html 요소를 이동, 회전, 크기 조정, 기울임 등을 통해 변형할 수 있는 
    css 속성 */

    /* position 속성
    html 문서 상에서 요소가 배치되는 방식을 결정
    position : static -> 문서 흐름에 다라 자연스럽게 쌓인다.
    position : relative -> 요소의 원래 위치를 벗어날 수 있게 해준다.
    원래 위치를 기준으로 상대적으로 이동된 배치를 해준다.
    position : absolute -> 요소를 문서 흐름에서 제거하고 원하는 
    좌표로 직접 배치할 수 있게 해준다. 이때 기준은 가장 가까운 부모이다. */

    .transform-box{
        width : 200px;
        height : 200px;
    }
    .transform-center{
        /* absolute는 가장 가까운 position이 지정된
        부모를 기준으로 움직인다. */
        position:absolute;
        top: 50%;
        left: 50%;
        /* 왼쪽 위 모서리가 화면 정중앙에 오기때문에 
        그만큼 자기 크기의 절반만큼 땡겨서 요소를 가운데 맞춘다. */
        transform: translate(-50%, -50%);
    }

    </style>
</head>
<body>
    <h3>display: block;</h3>
    <span class="box block">박스1</span>
    <span class="box block">박스2</span>

    <h3>display: inline</h3>
    <div class="box inline">박스3</div>
    <div class="box inline">박스4</div>

    <h3>display : inline-block</h3>
    <div class="box inline-block">div 박스5</div>
    <div class="box inline-block">div 박스6</div>

    <!-- display: flex 속성은 항상 
     자식요소들한테 적용이 된다. -->
    <h3>display : flex</h3>
    <div class="box flex">
        <div>
        <p>중앙정렬</p>
        <button>로그인</button>
        </div>
    </div>
    <h3> position과 transform을 이용한 중앙 정렬</h3>

    <div class="box transform-box">

    </div>



</body>
</html>
