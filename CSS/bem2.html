<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BEM 기반 상품 카드 컴포넌트</title>
    <style>
        /* 기본 스타일 및 레이아웃 (테스트용) */
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f9f9f9;
            padding: 40px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        /* ==========================================
           BEM 방법론 적용 스타일 (.product-card)
        ========================================== */

        /* 1. Block: 독립적인 컴포넌트 단위 */
        .product-card {
            background-color: #ffffff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 16px;
            width: 260px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }

        /* 2. Elements: 블록 내부를 구성하는 종속적인 요소들 */
        .product-card__image {
            width: 100%;
            height: 200px;
            background-color: #e9ecef; /* 실제 이미지 없을 때를 대비한 배경색 */
            border-radius: 4px;
            object-fit: cover;
            margin-bottom: 12px;
        }

        .product-card__title {
            font-size: 18px;
            font-weight: bold;
            color: #333333;
            margin: 0 0 8px 0;
        }

        .product-card__price {
            font-size: 16px;
            font-weight: 600;
            color: #e74c3c;
            margin: 0;
        }

        /* 3. Modifier: 블록의 상태나 버전을 나타내는 변형 */
        .product-card--soldout {
            background-color: #f5f5f5;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="product-card">
        <img class="product-card__image" src="https://via.placeholder.com/260x200/e9ecef/7f8c8d?text=Product+Image" alt="상품 이미지">
        <h3 class="product-card__title">프리미엄 무선 헤드폰</h3>
        <p class="product-card__price">129,000원</p>
    </div>

    <div class="product-card product-card--soldout">
        <img class="product-card__image" src="https://via.placeholder.com/260x200/e9ecef/7f8c8d?text=Sold+Out" alt="품절 상품 이미지">
        <h3 class="product-card__title">스마트 워치 시리즈 5</h3>
        <p class="product-card__price">250,000원 (품절)</p>
    </div>

</body>
</html>
