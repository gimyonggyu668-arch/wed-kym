<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Reset CSS
     브라우저가 기본적으로 적용하는 CSS 스타일을 초기화 하는 코드이다.
     HTML 태그들은 CSS를 작성하지 않아도 기본 스타일이 존재한다. 
     H1 -> 글자가 크고 굵다
     P -> 위아래 여백이 있다.
     ul -> 왼쪽 들여쓰기가 있다.
     
     개발자가 원하는 디자인을 처음부터 통일해서 만들기 위해 사용한다.-->

     <!-- normalize.css
      브라우저의 기본 스타일을 완전히 제거하는 것이 아니라, 브라우저마다 다르게 적용되는 부분을
       통일해주는 css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Document</title>
    <style>
        body{
            font-family : "Segoe UI", sans-serif;
            background-color : #f7f7f7;
            color : #2c3e50;
            padding : 20px;
        }

        /* h1 색을 #2980b9*/
        h1{
            color : #2980b9;
            font-size : 32px;
            font-weight : bold;
        }
        /* p 태그 배경 #ecf0f1 안쪽 여백을 10px 테두리 둥글게 6px */
        p{
            background-color : #eceff1;
            border:1px solid  #74b9ff;
            padding : 10px;
            border-radius : 4px;
        }

        table{
            border : 1x solid #95a5a6;
            border-collapse : collapse;
            width : 100%
        }
        th,td{
            border : 1px solid #bdc3c7;
            padding : 8px;
            text-align : left;
        }
        th{
            background-color: #74b9ff;
        }
    </style>
</head>
<body>
    <h1>Normalize.css</h1>
    <p>
    이 예제는 reset/css를 적용했을 때 브라우저 기본 스타일이 어떻게 ‘정돈’되는지를 보여준다.<br>
    위의 `<link>` 부분을 주석 처리하면, 각 브라우저별 기본 여백·폰트·표 스타일 차이를 볼 수 있다.
  </p>
    
  <h2>리스트 비교</h2>
  <ul>
    <li>html 기본 리스트 스타일</li>
    <li>reset.css 적용시 브라우저별 일관된 출력</li>
    <li>Normalize는 어느정도는 남겨둔다.</li>
  </ul>

  <h2>테이블 비교</h2>
  <table> 
    <tr>
        <th>이름</th>
        <th>점수</th>
    </tr>
    <tr>
        <td>홍길동</td>
        <td>95</td>
    </tr>
    <tr>
        <td>이몽룡</td>
        <td>88</td>
    </tr>
  </table>
</body>
</html>
