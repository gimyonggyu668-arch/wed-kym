<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body {
  background-color: #f0f2f5;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  font-family: sans-serif;
}

/* [요구사항] 상품 카드 기본 스타일 */
.product-card {
  width: 300px;
  background-color: #ffffff;
  border-radius: 12px;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* 기본 은은한 그림자 */
  overflow: hidden; /* 중요: 내부 이미지가 카드 밖으로 튀어나오지 않도록 처리 */
  
  /* [요구사항] 카드 transition 시간 0.3초 */
  transition: transform 0.3s ease, box-shadow 0.3s ease; 
}

/* 카드 이미지 박스 (비율 유지용) */
.card-image-box {
  width: 100%;
  height: 250px;
  overflow: hidden; /* 이미지 확대 시 삐져나오지 않도록 한 번 더 차단 */
}

.card-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  
  /* [요구사항] 이미지 transition 시간 0.4초 */
  transition: transform 0.4s ease; 
}

/* 카드 텍스트 컨텐츠 영역 */
.card-content {
  padding: 20px;
}

.product-title {
  margin: 0 0 10px 0;
  font-size: 18px;
  color: #333;
}



/* 카드 내부 버튼 기본 스타일 */
.card-btn {
  width: 100%;
  padding: 10px;
  background-color: #333;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
  transition: background-color 0.3s ease;
}
.product-card:hover {
  transform: translateY(-10px);
  box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2); 
}

/* 3. 이미지가 1.08배 확대됨 */
.product-card:hover .card-image {
  transform: scale(1.08);
}

/* 4. 버튼 배경색 변경 */
.product-card:hover .card-btn {
  background-color: #007bff; /* 더 짙은 파란색으로 변경 */
}
</style>
</head>
<body>
    <div class="product-card">
  <div class="card-image-box">
    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500" alt="상품 이미지" class="card-image">
  </div>
  <div class="card-content">
    <h3 class="product-title">프리미엄 무선 헤드폰</h3>
    <button class="card-btn">구매하기</button>
  </div>
</div>
</body>
</html>
