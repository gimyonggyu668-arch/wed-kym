<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>HTML 테이블 스타일링</title>
    <style>
        /* 기본 테이블 스타일링 (가독성을 위한 기초 설정) */
        table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Malgun Gothic', sans-serif;
            margin: 20px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 12px 15px;
            text-align: center;
            border: 1px solid #dee2e6;
        }

        /* [CSS 조건 1] 헤더 구조 스타일 */
        table tr:first-child {
            background-color: #2c3e50;
            color: #ffffff;
        }

        /* [CSS 조건 2] 구조 의사 클래스 활용 (짝수 번째 데이터 행) */
        /* 헤더(1번째)를 제외하고 실질적인 데이터 짝수 행에만 적용하기 위해 tr:nth-child(even) 사용 */
        table tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        /* [CSS 조건 3] 동적 의사 클래스 및 부정 선택자 조합 (:hover & :not) */
        /* 첫 번째 행(:first-child)과 마지막 행(:last-child)이 아닌 tr에만 hover 적용 */
        table tr:not(:first-child):not(:last-child):hover {
            background-color: #ebf5fb;
            cursor: pointer;
        }

        /* [CSS 조건 4] 마지막 행 스타일 (총합 행) */
        table tr:last-child {
            background-color: #eaeded;
            color: #2c3e50;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <th>품목명</th>
            <th>수량</th>
            <th>단가</th>
            <th>총액</th>
        </tr>
        
        <tr>
            <td>노트북</td>
            <td>2</td>
            <td>1,200,000원</td>
            <td>2,400,000원</td>
        </tr>
        <tr>
            <td>모니터</td>
            <td>4</td>
            <td>300,000원</td>
            <td>1,200,000원</td>
        </tr>
        <tr>
            <td>기계식 키보드</td>
            <td>5</td>
            <td>150,000원</td>
            <td>750,000원</td>
        </tr>
        <tr>
            <td>무선 마우스</td>
            <td>10</td>
            <td>50,000원</td>
            <td>500,000원</td>
        </tr>
        
        <tr>
            <td>합계</td>
            <td>21</td>
            <td>-</td>
            <td>4,850,000원</td>
        </tr>
    </table>

</body>
</html>
