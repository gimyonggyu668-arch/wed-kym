<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html{
            font-size : 16px; /* 1rem = 16px*/
        }
        div { 
            /*
            배경색 : #74b9ff
            글씨색 : 흰색
            안쪽 여백 : 10px*/
            background-color: #74b9ff;
            color : white;
            padding : 10px;
            margin-bottom : 10px;
        }

        .box-px{
            width: 260px;
        }
        .box-em{
            width: 10em;
        }
        .box-rem{
            width: 10rem;
        }
        .box-percent{
            width: 50%;
        }

    </style>
</head>
<body>
    <div class="box-px">width: 200px</div>
    <div class="box-em">width: 10em</div>
    <div class="box-rem">width: 10rem</div>
    <div class="box-percent">width: 50%</div>
</body>
</html>
