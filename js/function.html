<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>랜덤 강아지 사진 가져오기</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        #dog-img {
            display: block;
            margin: 20px auto;
            max-width: 400px;
            max-height: 400px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <h1>🐶 랜덤 강아지 사진 뷰어</h1>
    
    <button id="fetch-btn">강아지 사진 가져오기</button>
    
    <img id="dog-img" src="" alt="강아지 사진이 여기에 표시됩니다.">

    <script>
        // DOM 요소 선택
        const fetchBtn = document.getElementById('fetch-btn');
        const dogImg = document.getElementById('dog-img');
        const apiUrl = 'https://picsum.photos/v2/list?page=2&limit=100';

        // 이미지를 가져오는 비동기 함수
        async function fetchDogImage() {
            try {
                // API 요청 보내기
                const response = await fetch(apiUrl);
                
                // 요청이 성공적이지 않다면 에러 던지기
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                // JSON 데이터 파싱
                const data = await response.json();
                
                // 3. 사진이 변경될 때마다 새로운 이미지 주소(data.message)를 src에 대입
                dogImg.src = data.message;
                dogImg.alt = "귀여운 강아지 사진";

            } catch (error) {
                // 4. 오류 발생 시 콘솔에 에러 메시지 출력
                console.error('강아지 사진을 가져오는 중 오류가 발생했습니다:', error);
            }
        }

        // 버튼 클릭 이벤트 리스너 등록
        fetchBtn.addEventListener('click', fetchDogImage);

        // (선택사항) 페이지가 처음 로드될 때도 한 번 사진을 가져오고 싶다면 아래 주석을 해제하세요.
        // fetchDogImage();
    </script>

</body>
</html>
