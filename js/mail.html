<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑몰 상품 목록</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f6f9fc;
      padding: 20px;
    }
    header {
      max-width: 1200px;
      margin: 0 auto 30px auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    .controls {
      display: flex;
      gap: 10px;
      flex-grow: 1;
      max-width: 600px;
    }
    input[type="text"], select {
      padding: 10px 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    input[type="text"] {
      flex-grow: 1;
    }
    .cart-status {
      font-size: 16px;
      font-weight: bold;
      background-color: #007bff;
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
    }
    #loading {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      color: #666;
      margin-top: 50px;
    }
    #product-container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 25px;
    }
    .product-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      position: relative;
      transition: transform 0.2s;
    }
    .product-card:hover {
      transform: translateY(-5px);
    }
    .badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background-color: #dc3545;
      color: white;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: bold;
      border-radius: 20px;
      z-index: 10;
    }
    .img-container {
      width: 100%;
      height: 200px;
      background-color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .product-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .product-info {
      padding: 15px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }
    .brand {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #333;
      height: 44px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .price-block {
      display: flex;
      flex-direction: column;
    }
    .price {
      font-size: 18px;
      font-weight: bold;
      color: #222;
    }
    .discount {
      font-size: 12px;
      color: #e53e3e;
      font-weight: bold;
    }
    .rating {
      font-size: 14px;
      color: #ffaa00;
      font-weight: bold;
    }
    .add-to-cart-btn {
      width: 100%;
      background-color: #28a745;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-top: auto;
      transition: background 0.2s;
    }
    .add-to-cart-btn:hover {
      background-color: #218838;
    }
  </style>
</head>
<body>

  <header>
    <div class="controls">
      <input type="text" id="search-input" placeholder="상품명을 입력하세요...">
      <select id="category-filter">
        <option value="all">전체 카테고리</option>
      </select>
    </div>
    <div class="cart-status">🛒 장바구니: <span id="cart-count">0</span>개</div>
  </header>

  <div id="loading">상품 데이터를 불러오는 중입니다...</div>
  <main id="product-container"></main>

  <script>
   
    let allProducts = [];
    let cartCount = 0;

   
    const productContainer = document.getElementById('product-container');
    const loadingText = document.getElementById('loading');
    const searchInput = document.getElementById('search-input');
    const categoryFilter = document.getElementById('category-filter');
    const cartCountSpan = document.getElementById('cart-count');

    
    async function fetchProducts() {
      try {
     
        loadingText.style.display = 'block';
        
        const response = await fetch('https://dummyjson.com/products?limit=100');
        const data = await response.json();
        
        allProducts = data.products;
        
        initCategoryFilter(allProducts);
        displayProducts(allProducts);
        
      
        loadingText.style.display = 'none';
      } catch (error) {
        console.error('데이터를 가져오는 중 오류가 발생했습니다:', error);
        loadingText.innerText = '데이터를 불러오는 데 실패했습니다.';
      }
    }

  
    function initCategoryFilter(products) {
      const categories = ['all', ...new Set(products.map(p => p.category))];
      categoryFilter.innerHTML = categories.map(cat => 
        `<option value="${cat}">${cat === 'all' ? '전체 카테고리' : cat}</option>`
      ).join('');
    }

   
    function displayProducts(products) {
      if (products.length === 0) {
        productContainer.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #888;">검색 결과가 없습니다.</p>';
        return;
      }

      productContainer.innerHTML = products.map(product => {
       
        const isExpensive = product.price >= 100;
        const badgeHtml = isExpensive ? `<div class="badge">고가 상품</div>` : '';

        return `
          <div class="product-card">
            ${badgeHtml}
            <div class="img-container">
              <img class="product-img" src="${product.thumbnail}" alt="${product.title}" loading="lazy">
            </div>
            <div class="product-info">
              <span class="brand">${product.brand || 'Unknown'}</span>
              <h3 class="title">${product.title}</h3>
              <div class="meta-row">
                <div class="price-block">
                  <span class="price">$${product.price}</span>
                  <span class="discount">⬇ ${product.disabled ? 0 : product.discountPercentage}%</span>
                </div>
                <span class="rating">⭐ ${product.rating}</span>
              </div>
              <button class="add-to-cart-btn" onclick="addToCart()">장바구니 담기</button>
            </div>
          </div>
        `;
      }).join('');
    }

   
    function filterProducts() {
      const searchTerm = searchInput.value.toLowerCase();
      const selectedCategory = categoryFilter.value;

      const filtered = allProducts.filter(product => {
        const matchesSearch = product.title.toLowerCase().includes(searchTerm);
        const matchesCategory = selectedCategory === 'all' || product.category === selectedCategory;
        return matchesSearch && matchesCategory;
      });

      displayProducts(filtered);
    }

   
    function addToCart() {
      cartCount++;
      cartCountSpan.innerText = cartCount;
    }

   
    searchInput.addEventListener('input', filterProducts);
    categoryFilter.addEventListener('change', filterProducts);

   
    fetchProducts();
  </script>
</body>
</html>
