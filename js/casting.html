        // 자료형 변환
        //- 데이터의 타입을 변경하는 것

        // 명시적 형변환
        //- 함수나 연산자를 써서 직접 데이터의 타입을 바꾸는 것

        //Number()함수
        // 정수로 변환
        let num1 = Number('42');
        let num2 = parseInt('3.14');
        let num3 = parseFloat('3.14');

        document.write(typeof num1+'<br>');
        document.write(typeof num2+'<br>');
        document.write(typeof num3+'<br>');
           
        //String() 함수
        // 문자열로 변환
        let str1 = String(123);
        let str2 = (456).toString();
        document.write(typeof str1+'<br>');
        document.write(typeof str2+'<br>');

        //값을 논리형으로 변환 
        let bool1 = Boolean(0); //false
        let bool2 = Boolean('0'); //true
        let bool3 = Boolean(''); //falus

        // Java에서는 배열 int[] arr = {1,2,3}
        // js에서는 배열에 []를 사용한다. let arr = [1,2,3];
        
        document.write(bool1+'<br>');
        document.write(bool2+'<br>');
        document.write(bool3+'<br>');
        document.write(bool4+'<br>');

        //false로 처리되는 값들을 falsy값이라고 한다.

        //숫자연산
