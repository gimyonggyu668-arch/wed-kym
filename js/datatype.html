<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 자료형이란?
        // 값의 종류를 의미한다.

        // 자료형의 큰 분류
        // 원시 자료형 : 하나의 값 자체를 저장 숫자, 문자, 논리형
        // 참조 자료형 : 여러 값을 묶거나 기능을 가진 객체 배열, 객체, 함수

        // 원시 자료형
        // Number 숫자형
        // 숫자를 표현하는 자료형
        let age = 20;
        let price =15000;
        let temperature = 36.5;

        // 자바스크립트에서는 정수와 실수를 따로 구분하지 않고 둘 다 Number를 사용한다.
        // typeof 연산자를 통해서 값의 타입을 확인할 수 있다.
        document.write(typeof age + '<br>');
        document.write(typeof temperature + '<br>');

        // 연산도 가능하다
        let x = 10;
        let y = 3;
         
        document.write(x + y + '<br>');

        //Infinity
        document.write(10/0 + '<br>');

        //NaN(Not a Number);
        document.write('abc'*3);

        document.write(typeof NaN);
        document.write('<br>');
        document.write('<h1>문자열</h1>')

        // 문자열
        //- 문자를 표현하는 자료형
        let name = "홍길동"; // 큰 따옴표도 쓸 수 있다.
        let greet = 'hello'; // 작은따옴표도 쓸 수 있다.
        let msg = `안녕하시오`; // 백틱을 사용할 수 있다.
        document.write(typeof name + '<br>');
        document.write(typeof greet + '<br>');
        document.write(typeof msg + '<br>');

        // 논리형(boolean)
        // 참 또는 거짓을 표현한다.
        let isLogin = true;
        let isAdmin = false;

        document.write('<hr>');
        document.write('<h1>논리형<h1>');
        document.write(typeof isLogin +'<br>');
        document.write(typeof isAdmin +'<br>');

        document.write('<hr>');
        document.write('<h1>undfined</h1>');
        // 변수는 선언했지만 값이 들어가지 않는 상태 

        let userName;
        document.write(userName +'<br>');
        document.write(typeof userName +'<br>');
        
        document.write('<hr>');
        document.write('<h1>Null</h1>');
        //값이 없다는 것을 개발자가 의도적으로 넣은 값
        let selectedUser = null;

        document.write('<h1> bigNumber +<br>');

            a = 10;
            b = 5;

            document.write(a+BigInt(b));
            document.write('<hr>');
            document.write('<h1>symbol</h1>');
            //절대 중복되지 ㅇ낳는 고유한 값을 만들 때 사용하는 자료형
            //Symbol() 함수를 호출하여 작성

            let id1 = Symbol();
            let id2 = Symbol();

            document.write(typeof id2 + '<br>');

    </script>
