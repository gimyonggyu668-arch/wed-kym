<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        //for(초기식; 조건식; 증감식){
        //
        // 조건식이 참일 때 반복하고자 하는 명령

        //}

        // 헤더태그를 이용해서 화면에 출력하기 
        for(let i = 1; i < 7; i++){
            document.write('<h'+i+'>자바스크립트 </h' +i+'>');
        }
        for(let i = 1; i < 10; i++){
           let s = i * 8;
            document.write('<p>8 x '+i+'='+s+'</p>');
        }
        document.write('<hr>');
        document.write('<ul>');
        for(let i = 0; i < 3; i++){
            document.write('<li>안녕</li>')
        }
        document.write('</ul>')

        //for ... of문
        //배열의 값을 하나씩 꺼낼 때 사용한다.
        //for(let 변수 of 배열){
        //     반복할 코드
        // }

        let fruits = ["사과", "바나나", "포도"];

        for(let fruit of fruits){
            document.write(fruit,"<hr>");
        }

        //for ... in
        //객체의 key를 하나씩 꺼낼 때 사용한다.
        //for(let 변수 in 객체){
        //
        //}

        let student = {
            name : '홍길동',
            age : 20, 
            major : '웹개발'
        }

        for(let key in student){
            document.write(student[key], "<br>")
        }

    </script>
</head>

    <hr>
    <h3>1부터 입력한 수까지의 합</h3>

</body>
</html>
