<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 랜덤 강아지 사진 가져오기 -->
    <h2> 랜덤 강아지 사진 가져오기</h2>
    <button id="btn">사진 가져오기</button>
    <br><br>
    <img id="photo" width ="300px">

    <hr>
    <h2>음악 검색 하기</h2>
    <!-- 검색어를 입력하고 검색버튼을 누르면 리스트로 5개를 표시 -->

    <script>
        document.getElementById("btn").addEventListener("click",async ()=>{
            fetch("https://picsum.photos/v2/list?page=2&limit=100")
            .then(res => {
                if(!res.ok){
                    console.log("데이터 불러오기 실패");
                }
                return res.json();
            })
            .then(data => {
                //0 ~ data.length-1 사이의 랜덤 번호 생성
                const random = Math.floor(Math.random() * data.length);

                //랜덤 이미지 출력하기
                document.getElementById("photo").src = data[random].download_url;
            });
        })

        document.getElementById("btn4").addEventListener("click", () => {
            //input태그에 작성한 내용을 읽어와서 
            //객체로 만들기 

            fetch("http://jsonplaceholder.typicode.com/users", {
                method : "POST",
                headers : { "Content-Type" : "application/json"},
                body : JSON.stringify()
                })
            })
    </script>
</body>
</html>
