<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>연산자 버튼 계산기</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
        .input-group { margin-bottom: 10px; }
        .input-group input { width: 80px; padding: 5px; text-align: right; }
        .btn-group { margin: 15px 0; }
        .btn-group button { width: 40px; height: 35px; font-size: 16px; font-weight: bold; cursor: pointer; margin-right: 5px; }
        .result-box { padding: 10px; border: 1px solid #ccc; width: 220px; background-color: #f9f9f9; font-weight: bold; }
    </style>
</head>
<body>

   <h3>연산자 버튼 계산기</h3>
   
   <!-- 두 개의 숫자 입력창 -->
   <div class="input-group">
       <input type="number" id="num1" placeholder="숫자 1">
       <input type="number" id="num2" placeholder="숫자 2">
   </div>

   <!-- 연산자 버튼들 (클릭 시 각각 다른 기호를 함수로 전달) -->
   <div class="btn-group">
       <button onclick="calculate('+')">+</button>
       <button onclick="calculate('-')">-</button>
       <button onclick="calculate('*')">×</button>
       <button onclick="calculate('/')">÷</button>
   </div>

   <!-- 결과 출력 영역 -->
   <div id="result" class="result-box">결과가 여기에 출력됩니다.</div>
  <!-- 결과를 화면에 깔끔하게 출력 (예: 5 + 3 = 8) -->
          
   <script>
       function calculate(operator) {
           // 입력창의 값을 가져와서 소수점 연산까지 가능하도록 Number 타입으로 변환
           const n1 = Number(document.getElementById("num1").value);
           const n2 = Number(document.getElementById("num2").value);
           const resultDiv = document.getElementById("result");

           // 숫자가 제대로 입력되었는지 검증 (둘 중 하나라도 빈 값이면 실행 안 함)
           if (document.getElementById("num1").value === "" || document.getElementById("num2").value === "") {
               resultDiv.innerHTML = `<span style="color: red;">두 숫자를 모두 입력해 주세요.</span>`;
               return;
           }

           let calcResult = 0;

           // 전달받은 연산자 기호에 따라 계산 분기 처리
           switch(operator) {
               case '+':
                   calcResult = n1 + n2;
                   break;
               case '-':
                   calcResult = n1 - n2;
                   break;
               case '*':
                   calcResult = n1 * n2;
                   break;
               case '/':
                   // 0으로 나누려고 할 때의 예외 처리
                   if (n2 === 0) {
                       resultDiv.innerHTML = `<span style="color: red;">0으로 나눌 수 없습니다.</span>`;
                       return;
                   }
                   calcResult = n1 / n2;
                   break;
           }

           resultDiv.innerHTML = `계산 결과 : ${n1} ${operator} ${n2} = ${calcResult}`;
       }
   </script>
    
</body>
</html>
