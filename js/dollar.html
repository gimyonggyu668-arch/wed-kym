<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원가입 입력 검사</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background-color: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    .signup-box {
      width: 350px;
      background-color: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border: 1px solid #4a97bb;
      border-radius: 8px;
      box-sizing: border-box;
    }

    .message {
      font-size: 13px;
      margin-top: 5px;
    }

    .success {
      color: rgb(39, 168, 39);
    }

    .fail {
      color: rgb(231, 0, 0);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 25px;
      border: none;
      border-radius: 8px;
      background-color: #3f3ddb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #555;
    }

  </style>
</head>
<body>

  <div class="signup-box">
    <h2>회원가입</h2>

    <label for="userId">아이디</label>
    <input type="text" id="userId" placeholder="영문 소문자+숫자 5~12자 ">
    <p id="idMsg" class="message"></p>

    <label for="password">비밀번호</label>
    <input type="password" id="password" placeholder="영문+숫자+특수문자 8~15자">
    <p id="pwMsg" class="message"></p>

    <label for="email">이메일</label>
    <input type="text" id="email" placeholder="example@test.com">
    <p id="emailMsg" class="message"></p>

    <label for="name">이름</label>
    <input type="text" id="name" placeholder="한글 2~5자">
    <p id="nameMsg" class="message"></p>

    <button>가입하기</button>
  </div>

  <script>
    const userId = document.getElementById("userId");
    const password = document.getElementById("password");
    const email = document.getElementById("email");
    const nameInput = document.getElementById("name");

    const idMsg = document.getElementById("idMsg");
    const pwMsg = document.getElementById("pwMsg");
    const emailMsg = document.getElementById("emailMsg");
    const nameMsg = document.getElementById("nameMsg");

    const idRegex = /^[a-z0-9]{5,12}$/;
    const pwRegex = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[!@#$%^&*])[A-Za-z\d!@#$%^&*]{8,16}$/;
    const emailRegex = /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/;
    const nameRegex = /^[가-힣]{2,5}$/;

    userId.addEventListener("input", function () {
      if (idRegex.test(userId.value)) {
        idMsg.textContent = "사용 가능한 아이디입니다.";
        idMsg.className = "message success";
      } else {
        idMsg.textContent = "아이디는 영문 소문자와 숫자만 사용하여 5~12자로 입력하세요.";
        idMsg.className = "message fail";
      }
    });

    password.addEventListener("input", function () {
      if (pwRegex.test(password.value)) {
        pwMsg.textContent = "사용 가능한 비밀번호입니다.";
        pwMsg.className = "message success";
      } else {
        pwMsg.textContent = "비밀번호는 영문, 숫자, 특수문자를 포함하여 8~16자로 입력하세요.";
        pwMsg.className = "message fail";
      }
    });

    email.addEventListener("input", function () {
      if (emailRegex.test(email.value)) {
        emailMsg.textContent = "올바른 이메일 형식입니다.";
        emailMsg.className = "message success";
      } else {
        emailMsg.textContent = "이메일 형식이 올바르지 않습니다.";
        emailMsg.className = "message fail";
      }
    });

    nameInput.addEventListener("input", function () {
      if (nameRegex.test(nameInput.value)) {
        nameMsg.textContent = "올바른 이름입니다.";
        nameMsg.className = "message success";
      } else {
        nameMsg.textContent = "이름은 한글 2~5자로 입력하세요.";
        nameMsg.className = "message fail";
      }
    });
  </script>

</body>
</html>
