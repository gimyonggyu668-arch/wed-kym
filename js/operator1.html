<!DOCTYPE html>

    <script>
        function calc(){
        //농구공 25개가 있다.
        // 한 박스에 4개씩 담을 수 있을 때 필요한 박스요 개수를 
        // body에 출력해주세요
        let input = document.getElementById('count');

        //input태그에 들어가있는 값 뽑기
        //뽑아온 값은 무조건 문자열
        let count = Number(input.value);

        let box = count % 4 == 0 ? count / 4 : (count / 4) + 1;

        // 연산된 값을 넣어주기 위한 태그를 선택
        let div = document.getElementById('box');

        //innerHTML
        //태그를 포함해서 문자열을 쓰면 적용이 된다.

        //innerText
        //태그를 써도 그냥 물자열로 그대로 출력이 된다.

        div.innerText = box;
    }

    </script>
</head>
