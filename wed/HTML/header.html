<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 헤더 태크
     글의 제목이나 부제목을 표기할 때 사용 
     태그는 h1 ~ h6까지 존재하며, 숫자가 작을 수록 
     글씨 크기가 크다 -->

     <h1>Heading 1 tag</h1>
     <h2>Heading 2 tag</h2>
     <h3>Heading 3 tag</h3>
     <h4>Heading 4 tag</h4>
     <h5>Heading 5 tag</h5>
     <h6>Heading 6 tag</h6>

     <!-- 제목 용도로 헤더 태그를 사용해야 하며 
      단순히 글자 크기를 변경하거나 강조 표기 용도로 
      사용하지 않아야 한다. -->
</body>
</html>
