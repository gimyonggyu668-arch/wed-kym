<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 하이퍼링크
     문서 안에서 직접 모든 형식의 자료를 연결하고 가리킬 수 있는 참조 고리
     동영상, 음악, 그림, 프로그램, 파일, 글 등의 특정 위치를 지정할 수 있다.
     
     href 속성
     페이지를 이동할 링크(URL)을 지정할 수 있다.-->

     <a href="https://www.naver.com">네이버로 이동</a>

     <!-- 경로
      절대경로
      - 특정 문서 페이지 또는 이미지등 자원에 접근할 수 있는 전체 URL
      - photo.jpg 파일이 서버에서 /web/public/img/photo.jpg에 위치해 있다면
      <a href="/web/public/img/photo.jpg">사진</a>과 같이 표현할 수 있다.
      상대결로
      - 현재 페이지의 경로를 기준으로 탐색
      - /web/public/img/photo.jpg 여기에 이미지가 있고
      - /web/pulbic에 html파일이 있다면
      <a href= "img/photo.jpg">사진</a>
      -->

    
</body>
</html>
