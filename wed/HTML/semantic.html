<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 사이트의 도입부, 머릿부분에 사요잉 되고 사이트의 로고나 
     제목등을 기술할 때 사용한다.
     안에 부수적인 태그들이 추가적으로 들어갈 수 있다.
     검색창을 넣거나 사이트 메뉴를 넣기도 한다. -->
     <header>
        <h1>코딩 새싹 블로그</h1>
        <!-- 내비게이션 표현을 위한 태그로서 동일한 사이트 안의 
         다른 문서나 다른 사이트의 문서로 연결하는 링크들의 모음을 
         가지고 있다. -->
        <nav>
            <a href="#about">소개</a>
            <a href="#posts">글 목록</a>
            <a href="#contact">연락처</a>
        </nav>
     </header>
     <!-- 해당 페이지의 메인 콘텐츠를 나타낼 때 사용하며
      반드시 한 번만 사용되어야 한다. -->
      <main>
        <!-- 하나의 주제가 묶이는 태그 -->
         <section id="about">
            <h2>이 블로그는 무엇을 다루는가</h2>
            <p>웹 개발 입문자를 위한 초간단 학습 노트를 공유한다.</p>
         </section>
         <section id="posts">
            <h2>최근 글</h2>
            <!-- 독립적으로 재사용 가능한 글이나 게시물 단위 -->
             <article>
                <h3>HTML5 기본 구조 정복하기</h3>
                <p>시작은 가볍지만 중요한 개념을 담았다.</p>
                <time datetime="2025-10-21">2025년 10월 21일</time>
             </article>
            </section>
             <article>
                <h2>참고 링크</h2>
                <ul>
                    <li><a href="https://developer.mozilla.org/ko/">MDN</a></li>
                </ul>
             </article>
      </main>
      <footer>
        
      </footer>
</body>
</html>
