<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- <table> ~ </table> 테이블을 만들어주는 태그
     <tr> : 행을 만들어주는 태그 
     <td> : 열을 만들어주는 태그
     <th> : 테이블 헤더로 테이블 각 열을 대표하는 셀 -->
     
    <table border="1">
        <tr>
            <td>1행 1열</td>
            <td>1행 2열</td>
        </tr>
    </table>   

     <hr> 
    <table border="1">
        <tr>
            <td>1행 1열</td>
            <td>1행 1열</td>
        </tr>
    </table>   
     <hr> 
    <table border="1">
        <tr>
            <td>1행 1열</td>
            <td>2행 1열</td>
        </tr>
    </table>   
    <hr>
    <!-- 열 합치기 -->
    <table border="1">
        <tr>
            <td colspan="3">메뉴판</td>
        </tr>
        <tr>
            <td>짜장면</td>
            <td>짬뽕</td>
            <td>탕수육</td>

        </tr>
        
    </table>
</body>


</html>
