<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 텍스트 서식을 표현할 수 있는 태그 -->

    <!-- b 태그
     굵은 텍스트를 정의 -->
     <p><b>단락</b>을 구별하는 태그는 p태그이다.</p>
     <p>
        <!-- i태그
         텍스트 기울이기 -->
         <i>링크 태그</i>
         <em>링크태그2</em>
     </p>
     <p>
        <!-- del 태그
         취소선 -->
        My favorite color is <del>black</del> red.
     </p>
     <p>
        <!-- small 태그 
         글씨가 작게 나온다 -->
         HTML <small>Small</small> Formatting
     </p>
     <p>
        <!-- mark 태그
         하이라이트되서 나온다. -->
         HTML <mark>Marked</mark> Formatting
     </p>
     <p>
        <!-- sub 태그
         글이 아래로 나온다. -->
         This is <sub>subscripted</sub> text
     </p>
     <p>
        <!-- sup 태그
         글이 위로 나온다. -->
         This is <sup>supscripted</sup> text
     </p>
</body>
</html>
