<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 이미지 태그
     웹 페이지에서 이미지를 표시하기 위해 사용한다.
     필수 속성
     src - 이미지 경로를 지정
     alt - 이미지 대체 문구(이미지가 노출되지 않는 경우에 대체 노출되는 문구)
     
     width, height 속성
     이미지의 너비와 높이를 지정할 수 있다.-->
     <p>
        <!-- 
        ./ : 현재 자신의 위치 
        ../ : 상위 경로 
        / : 루트 경로를 의미한다.-->
        <img src="../img/dog.jpg" alt="dog">
     </p>
     
</body>
</html>
